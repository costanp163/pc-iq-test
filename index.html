<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P.C. IQ Test - Welcome</title>
    <style>
        /* General Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* The Main Wrapper */
        .welcome-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { margin-bottom: 5px; color: #2c3e50; }
        h2 { margin-bottom: 15px; color: #2c3e50; font-size: 1.5rem; }
        h3 { margin-top: 0; color: #7f8c8d; font-weight: 400; margin-bottom: 30px; }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #34495e;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            margin-top: 20px;
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* Timer and Sequence specific styles */
        .top-bar { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-bottom: 20px; }
        .timer { font-size: 1.2rem; font-weight: bold; color: #2c3e50; min-width: 40px; text-align: right;}
        .timer.warning { color: #e74c3c; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        /* Fixed Toggle Button Color */
        .toggle-btn { background: #ecf0f1; color: #2c3e50; border: 1px solid #bdc3c7; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; width: auto; margin-top: 0; }
        
        .sequence { font-size: 1.8rem; font-weight: bold; color: #34495e; margin: 20px 0; letter-spacing: 2px;}
        .answer-input { padding: 10px; width: 80px; text-align: center; font-size: 1.2rem; border: 2px solid #3498db; border-radius: 5px; margin: 0 auto; display: block; }
    </style>
</head>
<body>

<div class="welcome-card">
    
    <div id="screen-welcome">
        <h1>P.C. IQ Test</h1>
        <h3>Iteration 1</h3>
        <form id="welcome-form">
            <div class="form-group">
                <label for="full-name">Full Name (First and Last)</label>
                <input type="text" id="full-name" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" min="1" max="120" placeholder="Your age" required>
            </div>
            <div class="form-group">
                <label for="sex">Sex</label>
                <select id="sex" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other / Prefer not to say</option>
                </select>
            </div>
            <button type="submit">Next</button>
        </form>
    </div>

    <div id="screen-test" style="display: none;">
        <h1>Quick Question</h1>
        <div class="form-group">
            <label for="experience">Have you taken an IQ test before?</label>
            <select id="experience">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>
        <button id="final-next">Next</button>
    </div>

    <div id="prediction-page" style="display:none;">
        <h1>Prediction</h1>
        <p style="color: #7f8c8d; font-size: 0.9rem; margin-bottom: 20px;"><i>What score do you think you will get?</i></p>
        <div class="form-group">
            <input type="number" id="predicted-input" placeholder="Enter score (50-180)">
        </div>
        <button id="submit-prediction">Submit</button>
        <button id="skip-prediction" style="background-color: #95a5a6; margin-top: 10px;">Skip</button>
    </div>

    <div id="sequence-page" style="display: none;">
        <header class="top-bar">
            <button id="toggleTimerBtn" class="toggle-btn">Hide Timer</button>
            <div id="timerDisplay" class="timer">40s</div>
        </header>
        <h2>Complete the sequence:</h2>
        <p class="sequence">2, 5, 8, 11, 14, ?</p>
        <input type="text" id="answerInput" class="answer-input" placeholder="?">
        <button id="submit-sequence">Next</button>
    </div>

    <div id="sequence-page-2" style="display: none;">
        <header class="top-bar">
            <button id="toggleTimerBtn2" class="toggle-btn">Hide Timer</button>
            <div id="timerDisplay2" class="timer">40s</div>
        </header>
        <h2>Complete the sequence:</h2>
        <p class="sequence">Z, X, V, T, R, ?</p>
        <input type="text" id="answerInput2" class="answer-input" placeholder="?">
        <button id="submit-sequence-2">Next</button>
    </div>

    <div id="final-page" style="display:none;">
        <h1>Work in Progress</h1>
        <p style="color: #7f8c8d; margin-top: 15px;">All responses saved!</p>
    </div>

</div> 


<script>
    // --- TIMER VARIABLES ---
    let timeLeft = 40;
    let timerInterval;
    let timerHidden = false;

    let timeLeft2 = 40;
    let timerInterval2;
    let timerHidden2 = false;

    // --- FLOW CONTROL ---
    function goToNextSection() {
        document.getElementById('prediction-page').style.display = 'none';
        document.getElementById('sequence-page').style.display = 'block';
        startSequenceTimer(); 
    }

    // --- API & DB LISTENERS ---
    document.getElementById('welcome-form').addEventListener('submit', function(event) {
        event.preventDefault();
        const userData = {
            name: document.getElementById('full-name').value,
            age: document.getElementById('age').value,
            sex: document.getElementById('sex').value
        };

        fetch('https://pc-iq-test.onrender.com/submit-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        }).then(response => {
            if (response.ok) {
                document.getElementById('screen-welcome').style.display = 'none';
                document.getElementById('screen-test').style.display = 'block';
            }
        }).catch(() => {
            document.getElementById('screen-welcome').style.display = 'none';
            document.getElementById('screen-test').style.display = 'block';
        });
    });

    document.getElementById('final-next').addEventListener('click', function() {
        const exp = document.getElementById('experience').value;
        const nm = document.getElementById('full-name').value; 
        fetch('https://pc-iq-test.onrender.com/update-experience', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: nm, hasTakenBefore: exp })
        }).finally(() => {
            document.getElementById('screen-test').style.display = 'none';
            document.getElementById('prediction-page').style.display = 'block';
        });
    });

    document.getElementById('submit-prediction').addEventListener('click', function() {
        const nm = document.getElementById('full-name').value; 
        const pred = parseInt(document.getElementById('predicted-input').value);
        if (pred >= 50 && pred <= 180) {
            fetch('https://pc-iq-test.onrender.com/submit-prediction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: nm, predictedScore: pred })
            }).finally(() => { goToNextSection(); });
        } else {
            alert("Enter a score between 50 and 180, or press Skip.");
        }
    });

    document.getElementById('skip-prediction').addEventListener('click', goToNextSection);

    // --- QUESTION 1 LOGIC ---
    function startSequenceTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timerDisplay').innerText = timeLeft + "s";
            if (timeLeft <= 6) {
                document.getElementById('timerDisplay').style.display = 'block';
                document.getElementById('timerDisplay').classList.add('warning');
            } else if (timerHidden) {
                document.getElementById('timerDisplay').style.display = 'none';
            }
            if (timeLeft <= 0) { clearInterval(timerInterval); processSequenceAnswer(); }
        }, 1000);
    }

    document.getElementById('toggleTimerBtn').addEventListener('click', function() {
        timerHidden = !timerHidden;
        document.getElementById('timerDisplay').style.display = timerHidden ? 'none' : 'block';
        this.innerText = timerHidden ? 'Show Timer' : 'Hide Timer';
    });

    document.getElementById('submit-sequence').addEventListener('click', processSequenceAnswer);
    document.getElementById('answerInput').addEventListener('keypress', e => { if (e.key === 'Enter') processSequenceAnswer(); });

    function processSequenceAnswer() {
        clearInterval(timerInterval);
        const raw = document.getElementById('answerInput').value;
        const isCorrect = (raw.replace(/\s+/g, '') === "17");

        const results = JSON.parse(sessionStorage.getItem('testResults') || "[]");
        results.push({ question: "sequence_1", input: raw, correct: isCorrect, timeLeft: timeLeft });
        sessionStorage.setItem('testResults', JSON.stringify(results));

        document.getElementById('sequence-page').style.display = 'none';
        document.getElementById('sequence-page-2').style.display = 'block';
        startSequenceTimer2(); 
    }

    // --- QUESTION 2 LOGIC ---
    function startSequenceTimer2() {
        timerInterval2 = setInterval(() => {
            timeLeft2--;
            document.getElementById('timerDisplay2').innerText = timeLeft2 + "s";
            if (timeLeft2 <= 6) {
                document.getElementById('timerDisplay2').style.display = 'block';
                document.getElementById('timerDisplay2').classList.add('warning');
            } else if (timerHidden2) {
                document.getElementById('timerDisplay2').style.display = 'none';
            }
            if (timeLeft2 <= 0) { clearInterval(timerInterval2); processSequenceAnswer2(); }
        }, 1000);
    }

    document.getElementById('toggleTimerBtn2').addEventListener('click', function() {
        timerHidden2 = !timerHidden2;
        document.getElementById('timerDisplay2').style.display = timerHidden2 ? 'none' : 'block';
        this.innerText = timerHidden2 ? 'Show Timer' : 'Hide Timer';
    });

    document.getElementById('submit-sequence-2').addEventListener('click', processSequenceAnswer2);
    document.getElementById('answerInput2').addEventListener('keypress', e => { if (e.key === 'Enter') processSequenceAnswer2(); });

    function processSequenceAnswer2() {
        clearInterval(timerInterval2);
        const raw = document.getElementById('answerInput2').value;
        const isCorrect = (raw.replace(/\s+/g, '').toUpperCase() === "P");

        const results = JSON.parse(sessionStorage.getItem('testResults') || "[]");
        results.push({ question: "sequence_2", input: raw, correct: isCorrect, timeLeft: timeLeft2 });
        sessionStorage.setItem('testResults', JSON.stringify(results));

        document.getElementById('sequence-page-2').style.display = 'none';
        document.getElementById('final-page').style.display = 'block';
    }
</script>

</body>
</html>
