<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P.C. IQ Test - Welcome</title>
    <style>
        /* General Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* The Welcome Card */
        .welcome-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { margin-bottom: 5px; color: #2c3e50; }
        h3 { margin-top: 0; color: #7f8c8d; font-weight: 400; margin-bottom: 30px; }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #34495e;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            margin-top: 20px;
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

/* Add to existing <style> */
.top-bar { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-bottom: 20px; }
.timer { font-size: 1.2rem; font-weight: bold; color: #2c3e50; }
.timer.warning { color: #e74c3c; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0; } }
.toggle-btn { background: #ecf0f1; border: 1px solid #bdc3c7; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
.sequence { font-size: 1.8rem; font-weight: bold; color: #34495e; margin: 20px 0; }
#answerInput { padding: 10px; width: 80px; text-align: center; font-size: 1.2rem; border: 2px solid #3498db; border-radius: 5px; }

    </style>
</head>
<body>

<div class="welcome-card">
    <!-- SCREEN 1: THE WELCOME PAGE -->
    <div id="screen-welcome">
        <h1>P.C. IQ Test</h1>
        <h3>Iteration 1</h3>
        <form id="welcome-form">
            <div class="form-group">
                <label for="full-name">Full Name (First and Last)</label>
                <input type="text" id="full-name" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" min="1" max="120" placeholder="Your age" required>
            </div>
            <div class="form-group">
                <label for="sex">Sex</label>
                <select id="sex" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other / Prefer not to say</option>
                </select>
            </div>
            <button type="submit">Next</button>
        </form>
    </div>

    <!-- SCREEN 2: THE QUICK QUESTION PAGE -->
    <div id="screen-test" style="display: none;">
        <h1>Quick Question</h1>
        <div class="form-group">
            <label for="experience">Have you taken an IQ test before?</label>
            <select id="experience">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>
        <button id="final-next">Next</button>
    </div>

    <!-- SCREEN 3: THE PREDICTION PAGE -->
    <div id="prediction-page" style="display:none;">
        <h1>Prediction</h1>
        <p style="color: #7f8c8d; font-size: 0.9rem; margin-bottom: 20px;">
            <i>What score do you think you will get? (Optional)</i>
        </p>
        <div class="form-group">
            <input type="number" id="predicted-input" placeholder="Enter score (50-180)">
        </div>
        <button id="submit-prediction">Submit</button>
        <button id="skip-prediction" style="background-color: #95a5a6; margin-top: 10px;">Skip</button>
    </div>

    <div id="sequence-page" class="welcome-card" style="display: none;">
    <header class="top-bar">
        <button id="toggleTimerBtn" class="toggle-btn">Hide Timer</button>
        <div id="timerDisplay" class="timer">40s</div>
    </header>

    <main class="question-container">
        <h2>Complete the sequence:</h2>
        <p class="sequence">2, 5, 8, 11, 14, ?</p>
        
        <input type="number" id="answerInput" placeholder="?" autocomplete="off">
        <br><br>
        <button id="submit-sequence" class="next-btn">Next</button>
    </main>
</div>

    <!-- SCREEN 4: IQ TEST SECTION -->
    <div id="iq-test-section" style="display:none;">
        <h1>Test Starting</h1>
        <p>Prepare yourself...</p>
    </div>
</div>

<script>

let timeLeft = 40;
let timerInterval;
let timerHidden = false;

function startSequenceTimer() {
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timerDisplay').innerText = timeLeft + "s";
        
        // Timer behavior: reappear at 6 seconds
        if (timeLeft <= 6) {
            document.getElementById('timerDisplay').style.display = 'block';
            document.getElementById('timerDisplay').classList.add('warning');
        } else if (timerHidden) {
            document.getElementById('timerDisplay').style.display = 'none';
        }

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            processSequenceAnswer(); // Auto-submit
        }
    }, 1000);
}

    function goToNextSection() {
        document.getElementById('prediction-page').style.display = 'none';
        document.getElementById('iq-test-section').style.display = 'block'; 
    }

    // WELCOME FORM SUBMISSION
    document.getElementById('welcome-form').addEventListener('submit', function(event) {
        event.preventDefault();
        const userData = {
            name: document.getElementById('full-name').value,
            age: document.getElementById('age').value,
            sex: document.getElementById('sex').value
        };

        fetch('https://pc-iq-test.onrender.com/submit-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        })
        .then(response => {
            if (response.ok) {
                document.getElementById('screen-welcome').style.display = 'none';
                document.getElementById('screen-test').style.display = 'block';
            } else {
                alert("Server error. Try again.");
            }
        });
    });

    // QUICK QUESTION SUBMISSION
    document.getElementById('final-next').addEventListener('click', function() {
        const experienceValue = document.getElementById('experience').value;
        const nameValue = document.getElementById('full-name').value; 

        fetch('https://pc-iq-test.onrender.com/update-experience', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: nameValue, hasTakenBefore: experienceValue })
        })
        .then(response => {
            if (response.ok) {
                document.getElementById('screen-test').style.display = 'none';
                document.getElementById('prediction-page').style.display = 'block';
            }
        });
    });

    // PREDICTION SUBMISSION
    document.getElementById('submit-prediction').addEventListener('click', function() {
        const nameValue = document.getElementById('full-name').value; 
        const prediction = parseInt(document.getElementById('predicted-input').value);
        
        if (prediction >= 50 && prediction <= 180) {
            fetch('https://pc-iq-test.onrender.com/submit-prediction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: nameValue, predictedScore: prediction })
            }).finally(() => { goToNextSection(); });
        } else {
            // Update your existing goToNextSection function
function goToNextSection() {
    document.getElementById('prediction-page').style.display = 'none';
    document.getElementById('sequence-page').style.display = 'block';
    startSequenceTimer(); // Start the clock!
}
        }
    });

// Toggle Timer Visibility
document.getElementById('toggleTimerBtn').addEventListener('click', function() {
    timerHidden = !timerHidden;
    const display = document.getElementById('timerDisplay');
    display.style.display = timerHidden ? 'none' : 'block';
    this.innerText = timerHidden ? 'Show Timer' : 'Hide Timer';
});

// Process Answer
document.getElementById('submit-sequence').addEventListener('click', processSequenceAnswer);

function processSequenceAnswer() {
    clearInterval(timerInterval);
    const rawInput = document.getElementById('answerInput').value;
    const sanitized = rawInput.trim(); // Removes spaces
    const isCorrect = (sanitized === "17");

    // Store in Session Storage for now
    const results = JSON.parse(sessionStorage.getItem('testResults') || "[]");
    results.push({ question: "sequence_1", input: rawInput, correct: isCorrect });
    sessionStorage.setItem('testResults', JSON.stringify(results));

    // Move to next section (You'll need to define the next ID)
    document.getElementById('sequence-page').style.display = 'none';
    // document.getElementById('NEXT_PAGE_ID').style.display = 'block'; 
}

    // SKIP BUTTON
    document.getElementById('skip-prediction').addEventListener('click', function() {
        goToNextSection();
    });
</script>

</body>
</html>
